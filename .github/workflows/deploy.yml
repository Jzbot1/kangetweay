name: Deploy Stack to AWS EC2

on:
  push:
    branches:
      - main  # Trigger build on push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Build and Push Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jzgateway-backend:latest

      # 2. Build and Push Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jzgateway-frontend:latest

      # 3. Generate production docker-compose.yml from template using envsubst
      #    Template is committed in the repo — no heredocs, no path issues
      - name: Generate production docker-compose.yml
        run: |
          envsubst < docker-compose.prod.yml.template > docker-compose.prod.yml
          echo "=== Generated docker-compose.prod.yml ==="
          cat docker-compose.prod.yml
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          MOOGOLD_BASE_URL: ${{ secrets.MOOGOLD_BASE_URL }}

      # 4. SCP generated compose file + nginx config to the server
      - name: Copy configs to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/jzpay.shop.conf"
          target: "~/app/"

      # 5. SSH — run docker and nginx commands only (no file writing over SSH)
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app

            # Install the generated compose file
            mv ~/app/docker-compose.prod.yml ~/app/docker-compose.yml

            # Install and enable Nginx site config
            sudo mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled /var/www/certbot
            sudo cp ~/app/nginx/jzpay.shop.conf /etc/nginx/sites-available/jzpay.shop
            sudo ln -sf /etc/nginx/sites-available/jzpay.shop /etc/nginx/sites-enabled/jzpay.shop
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx

            echo "=== docker-compose.yml on server ==="
            cat ~/app/docker-compose.yml

            # Pull and restart
            docker compose pull
            docker compose down
            docker compose up -d

            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Ports}}"

