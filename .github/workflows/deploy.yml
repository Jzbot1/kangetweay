name: Deploy Stack to AWS EC2

on:
  push:
    branches:
      - main  # Trigger build on push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Build and Push Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jzgateway-backend:latest

      # 2. Build and Push Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jzgateway-frontend:latest

      # 3. Deploy to EC2 via SSH
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/app
            cd ~/app

            # -------------------------------------------------------------------
            # Write docker-compose.yml via python3 -c (no heredoc, no EOF issues)
            # -------------------------------------------------------------------
            python3 -c "
import os, textwrap
content = textwrap.dedent('''
services:
  postgres:
    image: postgres:16
    container_name: jzgateway-postgres
    environment:
      POSTGRES_DB: goldbridge
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - \"127.0.0.1:5432:5432\"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jzgateway-network

  redis:
    image: redis:7-alpine
    container_name: jzgateway-redis
    ports:
      - \"127.0.0.1:6379:6379\"
    networks:
      - jzgateway-network

  backend:
    image: {dh}/jzgateway-backend:latest
    container_name: jzgateway-backend
    ports:
      - \"127.0.0.1:3000:3000\"
    environment:
      - PORT=3000
      - DATABASE_URL={db}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET={jwt}
      - JWT_REFRESH_SECRET={jwt_r}
      - CREDENTIAL_ENCRYPTION_KEY={enc}
      - MOOGOLD_BASE_URL={mg}
    networks:
      - jzgateway-network
    depends_on:
      - postgres
      - redis

  frontend:
    image: {dh}/jzgateway-frontend:latest
    container_name: jzgateway-frontend
    ports:
      - \"8080:80\"
    networks:
      - jzgateway-network
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  jzgateway-network:
    driver: bridge
''').lstrip().format(
    dh=os.environ['DOCKERHUB_USERNAME'],
    db=os.environ['DATABASE_URL'],
    jwt=os.environ['JWT_SECRET'],
    jwt_r=os.environ['JWT_REFRESH_SECRET'],
    enc=os.environ['CREDENTIAL_ENCRYPTION_KEY'],
    mg=os.environ['MOOGOLD_BASE_URL'],
)
with open(os.path.expanduser('~/app/docker-compose.yml'), 'w') as f:
    f.write(content)
print('docker-compose.yml written OK')
"

            # -------------------------------------------------------------------
            # Write Nginx config (heredoc at column-0 — works correctly here
            # because appleboy/ssh-action base64-decodes and pipes to bash,
            # and the NGINXEOF terminator IS at column 0 in the raw script)
            # -------------------------------------------------------------------
            sudo mkdir -p /etc/nginx/sites-available /var/www/certbot
            sudo tee /etc/nginx/sites-available/jzpay.shop > /dev/null << 'NGINXEOF'
server {
    listen 80;
    listen [::]:80;
    server_name jzpay.shop www.jzpay.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jzpay.shop www.jzpay.shop;

    ssl_certificate     /etc/letsencrypt/live/jzpay.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jzpay.shop/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Content-Type-Options   nosniff        always;
    add_header X-Frame-Options          SAMEORIGIN     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_cache_bypass                 $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
NGINXEOF

            sudo ln -sf /etc/nginx/sites-available/jzpay.shop /etc/nginx/sites-enabled/jzpay.shop
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx

            # Pull latest images and restart the stack
            docker compose pull
            docker compose down
            docker compose up -d
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          MOOGOLD_BASE_URL: ${{ secrets.MOOGOLD_BASE_URL }}
