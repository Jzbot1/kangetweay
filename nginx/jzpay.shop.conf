# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name jzpay.shop www.jzpay.shop;

    # Allow Let's Encrypt ACME challenges to pass through for renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS – main site ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jzpay.shop www.jzpay.shop;

    # ── SSL certificates (managed by Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/jzpay.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jzpay.shop/privkey.pem;

    # ── Modern SSL settings ───────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS (6 months; remove includeSubDomains if you have non-HTTPS subdomains)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   nosniff        always;
    add_header X-Frame-Options          SAMEORIGIN     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Frontend (Docker container on port 8080) ──────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass          $http_upgrade;
    }

    # ── Backend API (/api/* and /v1/*) ────────────────────────────────────────
    # These blocks are optional: the Docker-internal Nginx (frontend container)
    # already proxies /api/ and /v1/ to the backend.  Uncomment if you ever
    # want to expose the backend directly through the host Nginx instead.
    #
    # location /api/ {
    #     proxy_pass         http://127.0.0.1:3000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    #
    # location /v1/ {
    #     proxy_pass         http://127.0.0.1:3000/v1/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
